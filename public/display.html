<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lucky Draw</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a1a2e;
      color: white;
      font-family: Arial, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    h1 { font-size: 48px; margin-bottom: 10px; }
    .subtitle { color: #aaa; font-size: 20px; margin-bottom: 60px; }
    #number {
      font-size: 120px;
      font-weight: bold;
      color: #f5a623;
      min-height: 160px;
      letter-spacing: 10px;
    }
    #name {
      font-size: 36px;
      color: #6c63ff;
      margin-top: 20px;
      min-height: 50px;
    }
    #status {
      margin-top: 40px;
      font-size: 18px;
      color: #aaa;
    }
    .rolling { animation: pulse 0.1s infinite; }
    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.3; }
      100% { opacity: 1; }
    }
  </style>
</head>
<body>
  <h1>🎰 Lucky Draw</h1>
  <p class="subtitle">Waiting for host to pick a winner...</p>
  <div id="number">????</div>
  <div id="name"></div>
  <div id="status">Stand by...</div>

  <script>
    let lastPick = null;

async function checkWinner() {
  try {
    const res = await fetch('/latest-winner');
    const data = await res.json();
    if (data && Array.isArray(data) && data.length > 0) {
      const key = data.map(p => p.number).join(',');
      if (key !== lastPick) {
        lastPick = key;
        showPlayers(data);
      }
    }
  } catch (e) {}
}

function showPlayers(players) {
  const numberEl = document.getElementById('number');
  const nameEl = document.getElementById('name');
  document.getElementById('status').textContent = '🎲 Picking...';
  nameEl.textContent = '';
  numberEl.classList.add('rolling');

  let count = 0;
  const interval = setInterval(() => {
    numberEl.textContent = Math.floor(Math.random() * 9000) + 1000;
    count++;
    if (count > 20) {
      clearInterval(interval);
      numberEl.classList.remove('rolling');
      numberEl.textContent = players.map(p => '#' + p.number).join('  |  ');
      nameEl.innerHTML = players.map(p => `🏆 ${p.name}`).join('<br>');
      document.getElementById('status').textContent = 'Please come on stage!';
    }
  }, 100);
}

setInterval(checkWinner, 2000);
  </script>
</body>
</html>
